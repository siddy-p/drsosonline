services:
  - type: web
    name: drsosonline
    runtime: python
    region: frankfurt       # closest to Ireland
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_SERVER
        value: smtp.drsosonline.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USE_TLS
        value: true
      - key: MAIL_USERNAME
        sync: false        # set in Render dashboard: noreply@drsosonline.com
      - key: MAIL_PASSWORD
        sync: false        # set in Render dashboard: cPanel email password
      - key: ADMIN_EMAIL
        sync: false        # set in Render dashboard: your personal email
      - key: DATABASE_URL
        sync: false        # set in Render dashboard — leave blank to use SQLite
