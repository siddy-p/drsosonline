name: Deploy Dr.SOS to Production

on:
  push:
    branches:
      - master

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, sqlite3, pdo_sqlite
          coverage: none

      - name: Copy .env.example to .env
        run: cp .env.example .env

      - name: Install Composer Dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Execute Tests
        run: php artisan test

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute SSH deployment commands
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.SSH_PATH }}
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          envs: DEPLOY_PATH,GH_PAT
          script: |
            set -e
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            if [ ! -d ".git" ]; then
              git clone https://$GH_PAT@github.com/siddy-p/drsosonline.git .
            else
              git pull origin master
            fi
            if [ ! -f ".env" ]; then
              cp .env.example .env
              /usr/php82/usr/bin/php artisan key:generate --force
            fi
            /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction
            /usr/php82/usr/bin/php artisan migrate --force
            /usr/php82/usr/bin/php artisan config:cache
            /usr/php82/usr/bin/php artisan route:cache
            /usr/php82/usr/bin/php artisan view:cache
