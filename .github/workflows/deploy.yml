name: Deploy Dr.SOS to Production

on:
  push:
    branches:
      - master

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, sqlite3, pdo_sqlite
          coverage: none

      - name: Copy .env.example to .env
        run: cp .env.example .env

      - name: Install Composer Dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Execute Tests
        run: php artisan test

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Option A: Deploy via git pull on the server (recommended for speed and reliability)
      - name: Execute SSH deployment commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            if [ ! -d "${{ secrets.SSH_PATH }}" ]; then
              mkdir -p "${{ secrets.SSH_PATH }}"
            fi
            cd ${{ secrets.SSH_PATH }}
            if [ ! -d ".git" ]; then
              git clone https://${{ secrets.GH_PAT }}@github.com/siddy-p/drsosonline.git .
            else
              git pull origin master
            fi
            if [ ! -f ".env" ]; then
              cp .env.example .env
              php artisan key:generate --force
            fi
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
